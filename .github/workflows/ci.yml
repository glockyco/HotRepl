name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      # HotRepl.BepInEx requires Unity assemblies that aren't available in CI.
      # Build only Core and Tests.
      - name: Restore
        run: |
          dotnet restore src/HotRepl.Core/HotRepl.Core.csproj
          dotnet restore tests/HotRepl.Tests/HotRepl.Tests.csproj

      - name: Build
        run: |
          dotnet build src/HotRepl.Core/HotRepl.Core.csproj --no-restore
          dotnet build tests/HotRepl.Tests/HotRepl.Tests.csproj --no-restore

      - name: Format check
        run: dotnet format src/HotRepl.Core/HotRepl.Core.csproj --verify-no-changes --no-restore

      - name: Test
        run: dotnet test tests/HotRepl.Tests/HotRepl.Tests.csproj --no-build --verbosity quiet

  python-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install
        run: uv pip install --system -e '.[dev]'

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/hotrepl/

      - name: Smoke tests (no server — all skip)
        run: pytest tests/ -v --tb=short
