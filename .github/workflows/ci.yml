name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Format check
        run: dotnet format src/HotRepl.Core/HotRepl.Core.csproj --verify-no-changes --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity quiet

  python-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install
        run: uv pip install --system -e '.[dev]'

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/hotrepl/

      - name: Smoke tests (no server — all skip)
        run: pytest tests/ -v --tb=short
